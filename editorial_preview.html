<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AXIS — Editorial Guided Preview</title>
  <style>
    /* Use current app fonts and colors (Barlow + coral accent) */
    @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;500;700&display=swap');
    body { margin:0; font-family: 'Barlow', sans-serif; background: linear-gradient(145deg, #dce6f0 0%, #e4ebf4 35%, #eaf0f7 70%, #f0f5fa 100%); color:#0f1020; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
    .phone { width: 420px; height: 800px; margin:48px auto; border-radius:28px; background: linear-gradient(180deg,#f7fbff,#f4f8fc); box-shadow: 0 20px 60px rgba(15,24,40,0.08); display:flex; flex-direction:column; align-items:center; padding:36px; position:relative; }
    .wordmark { font-family: 'Barlow', sans-serif; color:#0f1020; margin-top:4px; margin-bottom:18px; font-size:18px; letter-spacing:0.12em; font-weight:600; }
    .heading { font-family: 'Barlow', sans-serif; font-size:44px; line-height:1.02; text-align:center; color:#0f1020; margin-bottom:18px; font-weight:700; }
    .card { width: 320px; border-radius:16px; background: linear-gradient(180deg,#ffffff,#fbfdff); box-shadow: 0 12px 28px rgba(12,24,40,0.06); padding:18px; text-align:left; }
    .eyebrow { font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:#D85F4E; margin-bottom:6px; font-weight:700; }
    .subdur { font-size:13px; color:#23303a; margin-bottom:8px; font-weight:600; }
    .desc { font-size:14px; color:#2b3a43; line-height:1.5; margin-bottom:12px; }
    .pill { display:inline-block; padding:6px 12px; border-radius:999px; background:#f4f7fa; border:1px solid rgba(10,20,30,0.04); color:#23303a; font-size:13px; }
    .cta { margin-top:20px; width:320px; background:#D85F4E; color:#fff; border-radius:28px; padding:14px 18px; text-align:center; font-weight:700; box-shadow:0 8px 18px rgba(216,95,78,0.18); cursor:pointer; border:none; }
    .note { margin-top:14px; font-size:12px; color:#55656d; text-transform:uppercase; letter-spacing:0.12em; }
    .bg-wash { position:absolute; inset:0; background: radial-gradient(circle at 50% 40%, rgba(80,140,200,0.06), transparent 30%); pointer-events:none; border-radius:28px; }
  </style>
</head>
<body>
  <div class="phone" role="img" aria-label="AXIS editorial guided preview">
    <div class="bg-wash"></div>
    <div class="wordmark">AXIS</div>
    <div class="heading">Listen to your body</div>
    <div class="card" role="region" aria-label="Today's guided session">
      <div class="eyebrow">TODAY</div>
      <div class="subdur">Morning Session • 25 min</div>
      <div class="desc">A focused sequence to restore alignment and ease tension through your back.</div>
      <div style="text-align:center;"><span class="pill">Spine · Core · Posterior</span></div>
    </div>
    <div style="height:18px"></div>
    <div class="cta" onclick="alert('Start')">Start The Baseline Protocol</div>
    <div class="note">Guided • 12 exercises</div>
  </div>
</body>
</html>
