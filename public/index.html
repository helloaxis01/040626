function getCircadianPeriod() {
  const h = new Date().getHours();
  if (h >= 5 && h < 11) return "dawn";
  if (h >= 11 && h < 17) return "midday";
  if (h >= 17 && h < 22) return "prime";
  return "rest";
}

/** Locked mood from storage, or time-of-day when Auto — ignores invalid keys so theme data always exists. */
function axisResolveMoodPeriod(period) {
  if (period && CIRCADIAN_THEMES[period]) return period;
  return getCircadianPeriod();
}

/** sRGB relative luminance → readable ink on solid circadian accent fills */
function inkForAccentHex(hex) {
  const m = /^#?([0-9a-f]{6})$/i.exec(String(hex || "").trim());
  if (!m) return null;
  const n = parseInt(m[1], 16);
  const rs = (n >> 16) / 255, gs = ((n >> 8) & 255) / 255, bs = (n & 255) / 255;
  const lin = (v) => v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  const L = 0.2126 * lin(rs) + 0.7152 * lin(gs) + 0.0722 * lin(bs);
  return L < 0.43 ? "var(--axis-white)" : "var(--axis-black)";
}

function applyCircadianTheme(isDark, period) {
  const p = axisResolveMoodPeriod(period);
  const t = CIRCADIAN_THEMES[p][isDark ? "dark" : "light"];
  let el = document.getElementById("circadian-style");
  if (!el) { el = document.createElement("style"); el.id = "circadian-style"; document.head.appendChild(el); }
  const accentSec = t.accent && t.accent.match(/^#[0-9a-fA-F]{6}$/) ? t.accent + "99" : t.accentSecondary || t.accent;
  el.textContent = `
    [data-theme]:not([data-night="true"]) {
      --orb1: ${t.orb1} !important;
      --orb2: ${t.orb2} !important;
      --orb3: ${t.orb3} !important;
      --mood-accent: ${t.accent} !important;

}

/**
 * Maps an exercise to a key in EXERCISE_ANIMATION_SVGS, or null when no inline animation exists.
 * (Name-based; extend when new animation sets are added.)
 */
function resolveExerciseAnimationKey(trackId, exerciseId, exerciseName) {
  void trackId;
  void exerciseId;
  const compact = String(exerciseName || "").toLowerCase().replace(/[^a-z]/g, "");
  if (compact.includes("catcow") && EXERCISE_ANIMATION_SVGS.CatCow) return "CatCow";
  return null;
}

function exerciseAnimationStrokeColor(mode) {
  if (mode === "ultra") return "#FF3B30";
  if (mode === "light") return "#252525";
  return "#F6F7F8";
}

function exerciseAnimationModeFromTheme(theme, ultraNight) {
  if (ultraNight) return "ultra";
  return theme === "dark" ? "dark" : "light";
}

function exerciseCarouselGraphicColor(mode) {
  if (mode === "ultra") return "#CC0000";
  if (mode === "light") return "#252525";
  return "#F6F7F8";
}

function getInstructionFrameSvgs(animationKey) {
  if (!animationKey || !EXERCISE_INSTRUCTION_FRAMES[animationKey]) return null;
  return EXERCISE_INSTRUCTION_FRAMES[animationKey];
}

function tierIndexToInstructionFrameIndex(tierIndex, frameCount, tierKey = "", animationKey = null) {
  if (frameCount <= 0) return 0;
  // Cat-Cow instruction flow: POSITION (tabletop) -> NEXT (inhale/cow) -> THEN (exhale/cat) -> END/TIP (tabletop).
  if (animationKey === "CatCow" && frameCount >= 3) {
    if (tierKey === "next") return 2;
    if (tierKey === "then") return 1;
    if (tierKey === "tip") return 0;
  }
  return Math.min(tierIndex, frameCount - 1);
}

/**

    font-family:var(--font-display); font-size: var(--text-base); font-weight:600; letter-spacing:0.18em; text-transform:uppercase;
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  }
  .mark-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
  /* Expanded exercise: stack steps + timer; timer strip sits at end with even padding */
  .er-card.er-card--open .protocol-panel.panel {
    display: flex;
    flex-direction: column;
  }
  .er-card.er-card--open .protocol-panel.panel .steps {
    flex: 0 1 auto;
  }
  /* Full-width rules use --instruction-step-divider (25% opacity of #f6f7f8 on dark; light uses rgba black 0.25) */
  .er-card.er-card--open .protocol-panel.panel .session-timer-cta-wrap {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    align-self: stretch;
    margin-top: auto;
    padding-top: 20px;
    padding-bottom: 20px;
    padding-inline: var(--er-panel-pad-inline);

    max-width: 100%;
    border-top: 1px solid var(--instruction-step-divider);
  }
  .session-timer-cta-wrap > .timer-wrap {

    margin-top: 0 !important;
    margin-inline: 0 !important;
    padding-top: 14px;
    padding-left: 0;
    padding-right: 0;
    width: 100%;
    max-width: 100%;
    align-items: stretch;
  }
  .session-timer-cta-wrap .timer-top {
    justify-content: flex-start;
    width: 100%;
  }
  .session-timer-cta-wrap .timer-val {
    font-size: clamp(52px, 14vw, 72px);
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .session-timer-cta-wrap .timer-btns {

    width: 100%;
    gap: 10px;
    justify-content: stretch;
    align-items: stretch;
  }
  .session-timer-cta-wrap .timer-btns .tb,
  .session-timer-cta-wrap .timer-btns .tb-g {
    flex: 1 1 0;
    min-width: 0;
    width: auto;
  }
  .session-timer-cta-wrap .timer-btns .tb-g {
    padding-left: 12px;
    padding-right: 12px;
  }
  .protocol-panel.panel .mark-btn.mark-btn--start-timer {
    margin-top: 0;
    padding: 13px 16px;
    font-size: var(--text-sm);
    letter-spacing: 0.18em;
    border-radius: 12px;
    line-height: 1.25;
    min-height: 0;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    align-self: stretch;
  }
  .chk {
    width:26px; height:26px; flex-shrink:0; border-radius:50%; cursor:pointer;
    border:1.5px solid var(--glass-border-strong); background:var(--glass-bg);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center; transition:all 0.2s;
  }
  .chk.on { border-color:var(--accent); background:var(--accent); box-shadow:0 0 12px var(--accent-glow); }
  .chk svg { opacity:0; transition:opacity 0.15s; }
  .chk.on svg { opacity:1; }
  .ei { flex:1; min-width:0; }
  .en { font-size: var(--text-lg); font-weight:600; color:var(--text-primary); letter-spacing:-0.01em; transition:all 0.2s; }
  .er.open .en { color:var(--text-white); font-weight: 600; }
  .en.done { color:var(--text-done); text-decoration:line-through; }
  .en.skipped { color:var(--text-done); text-decoration:line-through; }
  .es { margin-top:4px; }

  .ereps { font-size: var(--text-sm); font-weight:500; font-family:var(--font-display); color:var(--text-secondary); letter-spacing:0.08em; margin-top:8px; text-transform:uppercase; }
  .npill {
    font-family:var(--font-display); font-weight:500; font-size: var(--text-sm); letter-spacing:0.16em; text-transform:uppercase; padding:2px 9px; border-radius:20px;
    background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--text-secondary);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .chev { color:var(--text-dim); font-size: var(--text-sm); transition:transform 0.25s; align-self:center; }
  .chev.op { transform:rotate(180deg); }
  .row-actions { display:flex; gap:4px; flex-shrink:0; align-self:center; }
  .ra-btn {
    min-width:44px; min-height:44px; border-radius:999px; border:1px solid var(--glass-border);
    padding:12px;
    background:var(--glass-bg); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    font-size: var(--text-sm); font-weight:600; line-height:1; transition:background 0.15s, border-color 0.15s, color 0.15s, transform var(--motion-fast), opacity var(--motion-fast); color:var(--text-dim);
    box-sizing:border-box; -webkit-tap-highlight-color: transparent;
  }
  .ra-btn:hover { background:var(--glass-bg-hover); border-color:var(--glass-border-strong); color:var(--text-primary); }
  .ra-btn:active { transform: scale(0.97); opacity: 0.9; }
  .ra-btn.fav-on { color:var(--accent); border-color:var(--accent); background:var(--accent-dim); }

  /* ── GUIDED CARD ── */
  .fc {
    margin-top:16px; padding:16px; border-radius:20px; position:relative; overflow:hidden;
    background:var(--glass-bg); backdrop-filter:blur(24px) saturate(1.8); -webkit-backdrop-filter:blur(24px) saturate(1.8);
    border:1px solid var(--glass-border); box-shadow:var(--glass-shadow), inset 0 1px 0 var(--glass-specular);
  }
  .fc::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px; pointer-events:none;
    background:linear-gradient(90deg, transparent, var(--glass-specular) 30%, rgba(255,255,255,0.22) 50%, var(--glass-specular) 70%, transparent);
  }
  .fc-idx { position:absolute; top:14px; right:16px; font-size: var(--text-sm); color:var(--text-dimmer); letter-spacing:0.12em; }
  .fc-name { font-size: var(--text-xl); font-weight: 600; letter-spacing:-0.03em; line-height:1.15; margin:4px 0 6px; color:var(--text-white); }
  .fc-sub { margin-bottom:16px; }
  .fc-steps { display:flex; flex-direction:column; gap:0; border-top:1px solid var(--border); padding-top:18px; margin-bottom:18px; padding-left:0; padding-right:0; box-sizing:border-box; }
  .fc-step { display:flex; gap:0; position:relative; }
  .fc-step:not(:last-child)::after { content:''; position:absolute; left:21px; top:42px; bottom:0; width:1px; background:var(--step-connector); display:none; }
  .fc-badge { display:none;
    width:42px; height:42px; flex-shrink:0; border-radius:12px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)), var(--glass-bg);
    border: 1px solid rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(12px) saturate(1.25);
    -webkit-backdrop-filter: blur(12px) saturate(1.25);
    box-shadow: 0 0 14px color-mix(in srgb, var(--accent) 22%, transparent), 0 0 6px color-mix(in srgb, var(--mood-accent) 18%, transparent), inset 0 1px 0 rgba(255, 255, 255, 0.14);
    display:flex; align-items:center; justify-content:center;
  }
  .fc-pos { font-size: var(--text-base); font-weight:600; color:var(--accent-secondary); }
  .fc-right { padding:0 0 35px 14px; flex:1; text-align:left; }
  .fc-plabel { font-size: var(--text-sm); font-family:var(--font-display); font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-secondary); margin-bottom:4px; }
  .fc-pfocus {
    display:inline-block; font-size: calc(var(--text-sm) + 2px); letter-spacing:0.16em; border-radius:20px; text-align:left; text-transform:uppercase;
    color:var(--accent-secondary); background:var(--accent-dim); border:1px solid rgba(255,191,101,0.18);
    padding:1px 9px; margin-bottom:6px;
  }
  [data-night="true"] .step-focus,
  [data-night="true"] .fc-pfocus {
    color: #FF3B30 !important;
    -webkit-text-fill-color: #FF3B30 !important;
  }
  .fc-timer { border-top:1px solid var(--border); padding-top:16px; margin-bottom:14px; }
  .fc-reps { border-top:1px solid var(--border); padding-top:14px; margin-bottom:14px; }
  /* flow fullscreen overlay */
  .fv-overlay {
    position:fixed; inset:0; z-index:500;
    background:var(--bg-gradient);
    display:flex; flex-direction:column;
  }
  .fv-top-bar {
    display:flex; align-items:center; justify-content:space-between;
    padding:calc(env(safe-area-inset-top, 0px) + 52px) var(--page-gutter) 16px; flex-shrink:0;
  }
  .fv-top-exit {
    background:none; border:none; cursor:pointer; padding:12px;
    color:var(--text-secondary); font-family:var(--font-display);
    font-size: var(--text-sm); letter-spacing:0.16em; text-transform:uppercase;
    min-height:44px; display:inline-flex; align-items:center; box-sizing:border-box;
    transition: color 0.15s, transform var(--motion-fast), opacity var(--motion-fast);
    -webkit-tap-highlight-color: transparent;
  }
  .fv-top-exit:active { transform: scale(0.97); opacity: 0.88; }
  .fv-top-meta { text-align:right; }
  .fv-top-section { font-size: var(--text-sm); letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dimmer); }
  .fv-top-prog { font-size: var(--text-xs); color:var(--text-secondary); margin-top:2px; }
  /* main card */
  .fv-main {
    flex:1; display:flex; flex-direction:column; justify-content:space-between;
    margin:0 16px; padding:32px 28px 28px; border-radius:28px; overflow:hidden;
    background:var(--glass-bg); border:1px solid var(--glass-border);
    box-shadow:var(--glass-shadow), inset 0 1px 0 var(--glass-specular);
  }
  .fv-name { font-size: 40px; font-weight: 600; letter-spacing:-0.03em; line-height:1.1; color:var(--text-white); margin-bottom:16px; }
  .fv-cue { font-size: var(--text-lg); }
  .fv-bottom { display:flex; flex-direction:column; gap:12px; }
  .fv-next { font-size: var(--text-sm); color:var(--text-dim); letter-spacing:0.10em; text-transform:uppercase; }
  .fv-next span { color:var(--text-secondary); font-style:italic; letter-spacing:0; text-transform:none; }
  /* action bar */
  .fv-bar {
    display:flex; gap:10px; padding:14px 16px calc(env(safe-area-inset-bottom,0px) + 20px); flex-shrink:0;
  }
  .fv-cta {
    width:100%; padding:16px 24px; border-radius:20px; cursor:pointer; transition:all 0.18s; border:none;
    background:var(--accent); color:var(--accent-btn-text);
    font-family:var(--font-display); font-size: var(--text-base); font-weight:700; letter-spacing:calc(0.16em * 0.95); text-transform:uppercase;
    box-shadow:0 4px 24px var(--accent-glow);
    display:flex; flex-direction:column; align-items:center;
  }
  .fv-cta:hover { box-shadow:0 6px 32px var(--accent-glow); transform:translateY(-1px); }
  .fv-cta:active { transform:scale(0.97); opacity:0.85; }
  .fv-cta.done { background:var(--accent-dim); border:1px solid var(--accent); color:var(--accent); }
  .axis-session-primary-cta {
    font-weight: 700 !important;
    letter-spacing: calc(0.18em * 0.95) !important;
  }
  .fv-skip {
    min-height:44px; padding:18px 20px; border-radius:18px; cursor:pointer;
    transition:background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s, transform var(--motion-fast), opacity var(--motion-fast);
    background:var(--glass-bg); border:1px solid var(--glass-border-strong); color:var(--text-secondary);
    font-family:var(--font-display); font-size: var(--text-base); font-weight: 600; letter-spacing:0.14em; text-transform:uppercase;
    box-shadow:0 1px 4px rgba(0,0,0,0.12); display:inline-flex; align-items:center; justify-content:center; box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
  }
  .fv-skip:active { transform: scale(0.98); opacity: 0.92; }
  .fv-prev {
    min-width:44px; min-height:44px; padding:12px 18px; border-radius:18px; cursor:pointer;
    transition:background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s, transform var(--motion-fast), opacity var(--motion-fast);
    background:var(--glass-bg); border:1px solid var(--glass-border-strong); color:var(--text-secondary);
    font-family:var(--font-display); font-size: var(--text-lg); line-height:1;
    box-shadow:0 1px 4px rgba(0,0,0,0.12); display:inline-flex; align-items:center; justify-content:center; box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
  }
  .fv-prev:active { transform: scale(0.97); opacity: 0.9; }
  .fv-prev:disabled { opacity:0.2; cursor:not-allowed; }

  /* ── EXERCISE VECTOR ANIMATION (16:9, scales with container) ── */
  /* Grid stack: abspos-only children collapse height in some browsers; grid keeps intrinsic SVG height. */
  .exercise-animation {
    display:grid; grid-template-columns:1fr; grid-template-rows:auto;
    width:100%; max-width:520px; margin:4px auto 18px;
    flex-shrink:0; box-sizing:border-box;
  }
  .exercise-animation--timer {
    max-width:640px; margin-top:8px; margin-bottom:18px;
  }
  .exercise-animation--preview {
    max-width:100%; margin:6px auto 10px; padding:0 4px;
  }
  .exercise-animation--preview .exercise-animation__layer > svg {
    max-height:min(36vh, 280px);
  }
  .er-card-preview-anim {
    width:100%; box-sizing:border-box; padding:10px 12px 4px;
    border-top:1px solid var(--border);
    cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  .er-card-preview-anim:focus-visible {
    outline:2px solid var(--accent); outline-offset:2px;
  }
  .guided-phase-anim-strip {
    flex-shrink:0; width:100%; box-sizing:border-box; padding:4px 20px 10px;
    display:flex; justify-content:center; align-items:center;
  }
  .guided-phase-anim-strip .exercise-animation {
    margin-top:0; margin-bottom:0;
  }
  .exercise-animation__layer {
    grid-area:1 / 1; display:flex; align-items:center; justify-content:center;
    width:100%; min-width:0;
  }
  .exercise-animation__layer > svg {
    width:100%; height:auto; max-height:min(52vh, 420px); display:block;
  }
  /* Nano Banana frames are filled silhouettes — use currentColor like .exercise-figure--catcow */
  .exercise-animation svg,
  .exercise-animation svg * {
    fill: currentColor !important;
    stroke: none !important;
  }
  @media (prefers-reduced-motion: reduce) {
    .exercise-animation__layer { transition-duration: 0.01ms !important; }
  }

  /* Instruction carousel (static pose per step; LIST / GUIDED / refresher) */
  .exercise-carousel { width: 100%; box-sizing: border-box; }
  .exercise-carousel__card { position: relative; width: 100%; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
  .exercise-carousel__graphic { width: 100%; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
  .exercise-carousel--small .exercise-carousel__graphic { max-height: min(28vh, 220px); }
  .exercise-carousel--medium .exercise-carousel__graphic { max-height: min(40vh, 300px); }
  .exercise-carousel--large .exercise-carousel__graphic { max-height: min(52vh, 420px); }
  .exercise-carousel__graphic svg { width: 100%; height: auto; display: block; max-height: inherit; }
  .exercise-carousel__graphic--catcow svg { transform-origin: center center; }
  /* Normalize Cat-Cow poses to CatCow_3_Black.svg visual size baseline. */
  .exercise-carousel__graphic--catcow-f1 svg { transform: scale(1.08); }
  .exercise-carousel__graphic--catcow-f2 svg { transform: scale(1.06); }
  .exercise-carousel__graphic--catcow-f3 svg { transform: scale(1); }
  .exercise-carousel__graphic svg path { fill: currentColor; }
  .exercise-carousel__dots { display: flex; gap: 10px; justify-content: center; align-items: center; margin-top: 14px; padding-bottom: 4px; flex-wrap: wrap; }
  .exercise-carousel__dot { width: 8px; height: 8px; border-radius: 50%; border: none; padding: 0; cursor: pointer; background: color-mix(in srgb, var(--accent) 40%, var(--border)); transition: transform 0.15s ease, background 0.15s ease; }
  .exercise-carousel__dot--active { background: var(--accent); transform: scale(1.2); }
  .app[data-night="true"] .exercise-carousel__dot { background: rgba(255,59,48,0.4); }
  .app[data-night="true"] .exercise-carousel__dot--active { background: #FF3B30; }
  .protocol-panel.panel .steps > .exercise-carousel,
  .content--session .protocol-panel.panel .steps > .exercise-carousel { padding-inline: var(--er-panel-pad-inline); box-sizing: border-box; }

  /* ── STEPS (A/B/C cues) — horizontal inset on .cue-tiers so dividers/text share one box (LIST/GUIDED) ── */
  .steps {
    display:flex; flex-direction:column; gap:0; margin-top:8px;
    padding-left:0; padding-right:0;
    box-sizing:border-box;
  }
  .er-card.er-card--open .protocol-panel.panel .steps {
    padding-left:0;
    padding-right:0;
  }
  .content--session .protocol-panel.panel .steps > .cue-tiers,
  .protocol-panel.panel .steps > .cue-tiers,
  .fc-steps > .cue-tiers {
    padding-inline: var(--er-panel-pad-inline);
    box-sizing: border-box;
    width: 100%;
    max-width: 100%;
  }
  .er-card.er-card--open .protocol-panel.panel .timer-wrap {
    margin-inline: var(--er-panel-pad-inline);
    box-sizing:border-box;
  }
  .step { display:flex; gap:10px; align-items:flex-start; padding:14px 0 29px; border-bottom:1px solid var(--border); }
  .step:last-child { border-bottom:none; }
  .step-badge { display:none;
    width:28px; flex-shrink:0; display:flex; align-items:flex-start; justify-content:flex-start; padding-top:3px;
  }
  .step-badge-inner {
    width:20px; height:20px; border-radius:50%;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
    border: 1px solid rgba(255, 255, 255, 0.14);
    backdrop-filter: blur(10px) saturate(1.2);
    -webkit-backdrop-filter: blur(10px) saturate(1.2);
    box-shadow: 0 0 10px color-mix(in srgb, var(--mood-accent) 28%, transparent), inset 0 1px 0 rgba(255, 255, 255, 0.14);
    display:flex; align-items:center; justify-content:center; line-height:1; flex-shrink:0;
  }
  /* Force-hide step number circles even if earlier rules include display:flex */
  .fc-badge,
  .step-badge,
  .step-badge-inner {
    display: none !important;
  }
  .step-pos { font-size: var(--text-sm); font-family:var(--font-display); font-weight:600; letter-spacing:0; color:var(--accent-secondary); }
  .step-right { flex:1; text-align:left; }
  .step-label { font-size: var(--text-lg); font-weight: 600; font-family:var(--font-display); color:var(--text-white); line-height:1.3; }
  .step-focus { font-size: calc(var(--text-xs) + 2px); font-family:var(--font-display); color:var(--accent-secondary); letter-spacing:0.1em; margin-top:8px; font-weight:500; text-transform:uppercase; }
  .step-cue { margin-top:8px; text-align:left; }
  .fc-steps .step { padding:12px 0; }

  /* ── TIMER ── */
  .timer-wrap {
    padding:16px 0 14px; margin-top:20px; margin-bottom:4px;
    border-top:1px solid var(--border);
    display:flex; flex-direction:column; gap:14px;
  }
  .timer-top { display:flex; align-items:flex-start; justify-content:flex-start; gap:8px; }
  .timer-val {
    font-size: 48px; font-weight:600; letter-spacing:-0.02em;
    color:var(--text-white); line-height:1;
    font-family:'Barlow', sans-serif;
    font-variant-numeric:tabular-nums;
  }
  .timer-next { text-align:right; }
  .timer-next { text-align:right; }
  .timer-next-lbl { font-size: var(--text-sm); letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dim); margin-bottom:3px; }
  .timer-next-name { font-size: var(--text-sm); font-family:var(--font-display); font-weight: 600; color:var(--text-secondary); letter-spacing:-0.01em; max-width:160px; line-height:1.3; }
  .timer-bar-track {
    height:3px; background:var(--border); border-radius:3px;
    overflow:hidden; width:100%;
  }
  .timer-bar-fill {
    height:3px; border-radius:3px;
    background:linear-gradient(90deg, var(--accent), var(--accent-dim));
    box-shadow:0 0 8px var(--accent-glow);
    transition:width 1s linear;
  }
  .timer-btns { display:flex; gap:8px; }
  .tb {
    flex:1; padding:10px 0; border-radius:20px; cursor:pointer; transition:all 0.15s;
    background:var(--accent); border:none; color:var(--accent-btn-text);
    font-family:var(--font-display); font-size: var(--text-base); font-weight:600;
    letter-spacing:0.16em; text-transform:uppercase;
    box-shadow:0 4px 14px var(--accent-glow);
  }
  .tb:hover { opacity:0.88; }
  .tb-g {
    padding:10px 20px; border-radius:20px; cursor:pointer; transition:all 0.15s;
    background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--text-secondary);
    font-family:var(--font-display); font-size: var(--text-sm); font-weight: 600;
    letter-spacing:0.14em; text-transform:uppercase;
  }
  .tb-g:hover { border-color:var(--glass-border-strong); color:var(--text-primary); }

  /* ── REPS ── */
  .reps-big {
    font-size:clamp(40px, 12vw, 60px); font-weight:600; letter-spacing:-0.03em; color:var(--text-white);
    line-height:1;
  }
  .reps-str {
    font-size: var(--text-xl); font-weight: 600; color:var(--text-white); letter-spacing:-0.01em; line-height:1.25;
  }
  .reps-unit {
    font-size: var(--text-sm); font-weight: 600; letter-spacing:0.18em; text-transform:uppercase;

  /* ── TAB BAR ── */
  .tab-bar {
    position:fixed; bottom:0; left:0; right:0;
    min-height: var(--axis-tab-h);
    background: var(--tab-bg);
    backdrop-filter: blur(25px) saturate(1.35); -webkit-backdrop-filter: blur(25px) saturate(1.35);
    border-top: 1px solid var(--border);
    display:flex; align-items:center; justify-content:space-around;
    padding: 6px 8px calc(12px + env(safe-area-inset-bottom,0px));
    z-index:300;
    box-sizing:border-box;
  }
  .tab-btn {
    display:flex; flex-direction: column; align-items:center; justify-content:center;
    gap:0;
    min-width:48px; min-height:48px; width:auto; height:auto;
    padding:0; border:none; cursor:pointer; border-radius:999px;
    background:transparent; color: rgba(225,236,252,0.68);
    transition:color 0.15s, transform var(--motion-fast), opacity var(--motion-fast); position:relative; flex:0 0 auto;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn-stack {
    --tab-icon-size: 30px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    flex-shrink:0;
  }
  .tab-btn:not(.active) .nav-tab-indicator {
    pointer-events: none;
  }
  .tab-btn:active { transform: scale(0.95); opacity: 0.88; }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn { color: color-mix(in srgb, var(--axis-black) 34%, transparent); }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn.active { color: #1D1D1F; }

  .tab-bar[data-night="false"][data-theme="dark"] .tab-btn { color: color-mix(in srgb, var(--axis-white) 25%, transparent); }
  .tab-bar[data-night="false"][data-theme="dark"] .tab-btn.active { color: #D1D5DB; }

  .tab-bar[data-night="false"][data-theme="light"] .tab-btn:hover:not(.active) { color: color-mix(in srgb, var(--axis-black) 47%, transparent); }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn.active:hover { color: #1D1D1F; }

  .tab-bar[data-night="false"][data-theme="dark"] .tab-btn:hover { color: color-mix(in srgb, var(--axis-white) 25%, transparent); }
  .tab-bar[data-night="false"][data-theme="dark"] .tab-btn.active:hover { color: var(--axis-white); }
  .tab-icon-shell {
    position:relative; display:flex; align-items:center; justify-content:center;
    width:var(--tab-icon-size, 30px); height:var(--tab-icon-size, 30px);
  }
  .tab-btn svg {
    stroke: currentColor;
    fill: none;
    transition: color 0.15s, opacity 0.15s, stroke-width 0.15s;
    width: var(--tab-icon-size, 30px);
    height: var(--tab-icon-size, 30px);
    stroke-width: 1.7;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 1;
  }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn:not(.active) svg {
    stroke-width: 1.45;
    opacity: 0.79;
  }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn.active svg {
    stroke-width: 2.05;
    opacity: 1;
  }
  .tab-btn.active .tab-icon-shell::before { content:none; }
  /* No legacy glow/dot under icons — only .nav-tab-indicator above (all themes) */
  .tab-bar .tab-btn .tab-icon-shell::before,
  .tab-bar .tab-btn .tab-icon-shell::after {
    content: none !important;
    display: none !important;
    border: none !important;
    box-shadow: none !important;
    background: none !important;
  }
  .tab-btn .tab-icon-shell svg { position:relative; z-index:1; }
  /* Pill above icon: 20% wider than icon, 4px gap to icon (tab-btn-stack gap), capsule ends */
  .nav-tab-indicator {
    box-sizing: border-box;
    width: calc(var(--tab-icon-size, 30px) * 1.2);
    height: 3px;
    min-height: 3px;
    border-radius: 9999px;
    margin: 0;
    align-self: center;
    flex-shrink: 0;
    background: transparent;
    opacity: 0;
    transform: none;
    transition: opacity 0.18s ease, background 0.18s ease;
  }
  .tab-btn.active .nav-tab-indicator {
    opacity: 1;
    background: var(--mood-accent);
    box-shadow: none;
  }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn.active .nav-tab-indicator {
    background: var(--accent);
    opacity: 1;
  }
  .tab-bar-spacer {
    height: calc(var(--axis-bottom-content-inset) + var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 56px);
  }

  /* TODAY (solid highlight) sometimes needs extra breathing room */
  .tab-bar-spacer--today {
    height: calc(var(--axis-bottom-content-inset) + var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 140px);
  }

  /* Active SESSION (LIST / GUIDED / SUMMARY): tight tail above tab bar — no duplicate --axis-bottom-content-inset + 56px stack */
  .tab-bar-spacer--session {
    height: calc(var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 12px);
    min-height: 0;
  }
  /* Summary: same tail as Today — long scroll so bottom CTA clears fixed tab bar + home indicator */
  .tab-bar-spacer--summary,
  .tab-bar-spacer--metrics {
    height: calc(var(--axis-bottom-content-inset) + var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 140px);
    flex-shrink: 0;

  /* Global dashboard (safe area + progress + AXIS + streak) */
  .dashboard-header {

  /* Dark (circadian): inactive track + empty streaks — mood tint reads on teal, not as “holes” */

  .home .track-cards-outer.home-track-cards-outer--top.home-track-cards-outer--summary {

  .track-group { padding:0; max-width:100%; }

  .track-group-label {

  .home-category-tab {

  .app[data-night="true"] .content .home-category-tab:not([aria-selected="true"]),
  .app[data-night="true"] .home .home-category-tab:not([aria-selected="true"]),

  }
  .app[data-night="true"] .content .home-category-tab[aria-selected="true"],
  .app[data-night="true"] .home .home-category-tab[aria-selected="true"],
  .app[data-night="true"] .home-category-tab[aria-selected="true"] {

  .app[data-night="true"] .home .home-category-tab[aria-selected="true"]::after,

  .home-browse-heading {

  /* TODAY hero: body + button colors come from inline styles (accent fill varies) */

  /* ── TRACK CARD ── */
  .track-card {
    background:var(--glass-bg); backdrop-filter:blur(24px) saturate(1.4); -webkit-backdrop-filter:blur(24px) saturate(1.4);

    display:flex; flex-direction:column; gap:12px; position:relative; overflow:hidden;
  }

  /* Home Browse: flatter track cards (match Metrics Sessions/Active Days boxes vibe) */
  .home .track-card {
    border-radius: 20px;

    background: color-mix(in srgb, var(--glass-bg) 92%, transparent);

async function bootstrapAxisApp() {
  console.log("BASE REVERT SUCCESSFUL");
  window.__AXIS_DATA_LOAD_ERROR = "";
  try {
    const res = await fetch("./axis_data.json", { cache: "no-store" });
    if (!res.ok) throw new Error("axis_data.json: HTTP " + res.status);
    const data = await res.json();
    window.AXIS_JSON = data;
    if (data && data.TRACKS && Object.keys(data.TRACKS).length) {
      TRACKS = axisNormalizeTracks(data.TRACKS);
    } else {
      throw new Error("axis_data.json: missing TRACKS");
    }
  } catch (err) {
    console.error("AXIS: workout data load failed", err);
    TRACKS = TRACKS_DATA_FALLBACK;
    window.__AXIS_DATA_LOAD_ERROR = "Workout library could not be loaded from axis_data.json. Sessions will be empty until the file is available next to this page. (" + (err && err.message ? err.message : String(err)) + ")";
  }
  try {
    if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
      showLoadErr("App libraries did not load. Check your connection and refresh.");
      return;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  } catch (e) {
    showLoadErr("Error: " + (e && e.message ? e.message : String(e)) + (e && e.stack ? "\n\n" + e.stack : ""));
  }
}
