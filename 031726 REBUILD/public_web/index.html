function getCircadianPeriod() {
  const h = new Date().getHours();
  if (h >= 5 && h < 11) return "dawn";
  if (h >= 11 && h < 17) return "midday";
  if (h >= 17 && h < 22) return "prime";
  return "rest";
}

  return getCircadianPeriod();

/** sRGB relative luminance → readable ink on solid circadian accent fills */
function inkForAccentHex(hex) {
  const m = /^#?([0-9a-f]{6})$/i.exec(String(hex || "").trim());

  /* ── BASE ── */
  .app {
    --axis-tab-h: 100px;
    --axis-tab-clearance: 24px;
    --axis-bottom-content-inset: 120px;
    min-height:100vh;
    min-height:100dvh;
    height:100%;
    width:100%;
    max-width:100vw;
    min-width:0;
    display:flex;
    flex-direction:column;
    overflow: hidden;
    -webkit-overflow-scrolling:touch;
    background: var(--bg-app, var(--bg-gradient));
    background-color: var(--bg-fallback, #1A1A1A);
    color:var(--text-primary);
    font-family:var(--font-ui);
    font-weight: 400;
    position:relative;
    transition:color 0.3s;
    box-sizing:border-box;
  }
  @media (prefers-reduced-motion: no-preference) {
    [data-theme]:not([data-night="true"]) .app {
      background: var(--bg-fallback, #1A1A1A);
      transition: color 0.3s ease, background var(--motion-slow), background-color var(--motion-slow);
    }
    [data-theme]:not([data-night="true"]) .app::before,
    [data-theme]:not([data-night="true"]) .app::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      transition: opacity var(--motion-slow);
    }
    [data-theme]:not([data-night="true"]) .app::before {
      background: var(--bg-app-a, var(--bg-app, var(--bg-gradient)));
      opacity: 1;
    }
    [data-theme]:not([data-night="true"]) .app::after {
      background: var(--bg-app-b, var(--bg-app, var(--bg-gradient)));
      opacity: 0;
    }
    html.axis-mood-xfade--b-top [data-theme]:not([data-night="true"]) .app::before {
      opacity: 0;
    }
    html.axis-mood-xfade--b-top [data-theme]:not([data-night="true"]) .app::after {
      opacity: 1;
    }
    [data-theme]:not([data-night="true"]) .tab-btn.active .tab-icon-shell::before,
    [data-theme]:not([data-night="true"]) .track-btn.active,
    [data-theme]:not([data-night="true"]) .fav-toggle.on {
      transition: background var(--motion-slow), color var(--motion-slow), border-color var(--motion-slow), box-shadow var(--motion-slow);
    }
  }
  @media (prefers-reduced-motion: reduce) {
    [data-theme]:not([data-night="true"]) .app::before,
    [data-theme]:not([data-night="true"]) .app::after {
      content: none !important;
      display: none !important;
    }
  }
  .app-body { flex:1; display:flex; flex-direction:column; width:100%; position:relative; min-height:0; z-index: 1; }
  .app-orbs { position:fixed; inset:0; z-index:1; pointer-events:none; }
  /* Soft orbs as atmosphere (not light sources) */
  .app[data-theme="dark"]:not([data-night="true"]) .app-orbs {

  }
  .app-orbs::after {
    content:''; position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 40%, rgba(255,255,255,0.02) 60%, transparent 100%);

  .app[data-theme="light"]:not([data-night="true"]) .app-orbs::after {
    background: rgba(255,255,255,0.85) !important;

  /* Portrait lock: hide app in landscape. Exception: body.axis-media-expand-active (AXIS_BODY_CLASS_MEDIA_EXPAND_ACTIVE) while ExerciseCarousel portal enlarge is open — required for every gif/webp demo and any future non–native-fullscreen enlarge; new Baseline videos use that carousel path. */
  @media screen and (orientation: landscape) {

  .hdr { position:relative; padding:0 var(--page-gutter); box-sizing:border-box; width:100%; }

  /* Unified Liquid Glass — major cards (Home + Protocol) */

    border: 1px solid rgba(255, 255, 255, 0.1);

  .panel:focus { outline: none; }

  [data-theme="dark"] .panel {

  .reps-left { display:flex; flex-direction:column; flex:1; min-width:0; }
  .mark-btn {

  }
  .protocol-panel.panel .mark-btn.mark-btn--start-timer {
    margin-top: 0;
    padding: 13px 16px;
    font-size: var(--text-sm);
    letter-spacing: 0.18em;
    border-radius: 12px;
    line-height: 1.25;
    min-height: 0;
    width: 100%;
    max-width: 100%;

  }
  .chk {
    width:26px; height:26px; flex-shrink:0; border-radius:50%; cursor:pointer;
    border:1.5px solid var(--glass-border-strong); background:var(--glass-bg);

  .en { font-size: var(--text-lg); font-weight:700; color:var(--text-primary); letter-spacing:-0.02em; transition:all 0.2s; }

  .en.skipped { color:var(--text-done); text-decoration:line-through; }
  .es { margin-top:4px; }

  .ereps { font-size: var(--text-sm); font-weight:500; font-family:var(--font-ui); color:var(--text-secondary); letter-spacing:0.08em; margin-top:8px; text-transform:uppercase; font-variant-numeric: tabular-nums; }
  .npill {

  .ra-btn {

  /* ── GUIDED CARD ── */
  .fc {
    margin-top:16px; padding:16px; border-radius:20px; position:relative; overflow:hidden;
    background:var(--glass-bg); backdrop-filter:blur(24px) saturate(1.8); -webkit-backdrop-filter:blur(24px) saturate(1.8);

  }

  }
  .fc-idx { position:absolute; top:14px; right:16px; font-size: var(--text-sm); color:var(--text-dimmer); letter-spacing:0.12em; }
  .fc-name { font-size: var(--text-xl); font-weight: 700; letter-spacing:-0.02em; line-height:1.15; margin:4px 0 6px; color:var(--text-white); }
  .fc-sub { margin-bottom:16px; }

    backdrop-filter: blur(12px) saturate(1.25);

    display:flex; align-items:center; justify-content:center;
  }
  .fc-pos { font-size: var(--text-base); font-weight:600; color:var(--accent-secondary); }
  .fc-right { padding:0 0 35px 14px; flex:1; text-align:left; }
  .fc-plabel { font-size: var(--text-sm); font-family:var(--font-ui); font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-secondary); margin-bottom:4px; }
  .fc-pfocus {
    display:inline-block; font-size: calc(var(--text-sm) + 2px); letter-spacing:0.16em; border-radius:20px; text-align:left; text-transform:uppercase;

  .fc-reps { border-top:1px solid var(--border); padding-top:14px; margin-bottom:14px; }
  /* flow fullscreen overlay */
  .fv-overlay {
    position:fixed; inset:0; z-index:500;

    display:flex; flex-direction:column;
  }
  .fv-top-bar {

  }

  /* main card */

  .fv-next span { color:var(--text-secondary); font-style:italic; letter-spacing:0; text-transform:none; }
  /* action bar */
  .fv-bar {
    display:flex; gap:10px; padding:14px 16px calc(env(safe-area-inset-bottom,0px) + 20px); flex-shrink:0;
  }
  .fv-cta {

  /* ── EXERCISE VECTOR ANIMATION (16:9, scales with container) ── */
  /* Grid stack: abspos-only children collapse height in some browsers; grid keeps intrinsic SVG height. */
  .exercise-animation {
    display:grid; grid-template-columns:1fr; grid-template-rows:auto;
    width:100%; max-width:520px; margin:4px auto 18px;
    flex-shrink:0; box-sizing:border-box;
  }
  .exercise-animation--timer {
    max-width:640px; margin-top:8px; margin-bottom:18px;
  }
  .exercise-animation--preview {
    max-width:100%; margin:6px auto 10px; padding:0 4px;
  }
  .exercise-animation--preview .exercise-animation__layer > svg {
    max-height:min(36vh, 280px);
  }
  .exercise-animation--empty {
    aspect-ratio:16/9;
    max-height:min(52vh, 420px);
  }
  .er-card-preview-anim {
    width:100%; box-sizing:border-box; padding:10px 12px 4px;
    border-top:1px solid var(--border);
    cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  .er-card-preview-anim:focus-visible {
    outline:2px solid var(--accent); outline-offset:2px;
  }
  .guided-phase-anim-strip {
    flex-shrink:0; width:100%; box-sizing:border-box; padding:4px 20px 10px;
    display:flex; justify-content:center; align-items:center;
  }
  .guided-phase-anim-strip .exercise-animation {
    margin-top:0; margin-bottom:0;
  }
  .exercise-animation__layer {
    grid-area:1 / 1; display:flex; align-items:center; justify-content:center;
    width:100%; min-width:0;
  }
  .exercise-animation__layer > svg {
    width:100%; height:auto; max-height:min(52vh, 420px); display:block;
  }
  .exercise-animation__layer > img {
    width:100%; height:auto; max-height:min(52vh, 420px); display:block; object-fit:contain;
  }
  .exercise-animation__media {
    width: 100%;
    height: 100%;
    aspect-ratio: 16 / 9;
    max-height: min(52vh, 420px);
    display: block;
    border-radius: 12px;
    object-fit: contain;
  }
  .exercise-animation--video {
    aspect-ratio: 16 / 9;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Nano Banana frames are filled silhouettes — use currentColor like .exercise-figure--catcow */
  .exercise-animation svg,
  .exercise-animation svg * {
    fill: currentColor !important;
    stroke: none !important;
  }
  @media (prefers-reduced-motion: reduce) {
    .exercise-animation__layer { transition-duration: 0.01ms !important; }

  /* ── FAV FILTER (iPhone: single row, tight pills) ── */

  .fav-toggle {

  /* ── TAB BAR ── */
  .tab-bar {
    position:fixed; bottom:0; left:0; right:0;
    min-height: var(--axis-tab-h);
    background: var(--tab-bg);
    backdrop-filter: blur(25px) saturate(1.35); -webkit-backdrop-filter: blur(25px) saturate(1.35);

    display:flex; flex-direction: column; align-items:center; justify-content:center;
    gap:0;

    padding:0; border:none; cursor:pointer; border-radius:999px;

    -webkit-tap-highlight-color: transparent;

    --tab-icon-size: 30px;

    justify-content:center;
    gap:6px;
    flex-shrink:0;
  }
  .tab-btn:not(.active) .nav-tab-indicator {

  .tab-bar[data-night="false"][data-theme="dark"] .tab-btn.active { color: #D1D5DB; }

  .tab-bar[data-night="false"][data-theme="light"] .tab-btn:hover:not(.active) { color: color-mix(in srgb, var(--axis-black) 47%, transparent); }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn.active:hover { color: #1D1D1F; }

  .tab-bar[data-night="false"][data-theme="dark"] .tab-btn:hover { color: color-mix(in srgb, var(--axis-white) 25%, transparent); }
  .tab-bar[data-night="false"][data-theme="dark"] .tab-btn.active:hover { color: var(--axis-white); }
  .tab-icon-shell {
    position:relative; display:flex; align-items:center; justify-content:center;
    width:var(--tab-icon-size, 30px); height:var(--tab-icon-size, 30px);
  }
  .tab-btn svg {
    stroke: currentColor;
    fill: none;
    transition: color 0.15s, opacity 0.15s, stroke-width 0.15s;
    width: var(--tab-icon-size, 30px);
    height: var(--tab-icon-size, 30px);
    stroke-width: 1.7;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 1;
  }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn:not(.active) svg {
    stroke-width: 1.45;
    opacity: 0.79;
  }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn.active svg {
    stroke-width: 2.05;
    opacity: 1;
  }
  .tab-btn.active .tab-icon-shell::before { content:none; }
  /* No legacy glow/dot under icons — only .nav-tab-indicator above (all themes) */
  .tab-bar .tab-btn .tab-icon-shell::before,
  .tab-bar .tab-btn .tab-icon-shell::after {
    content: none !important;
    display: none !important;
    border: none !important;
    box-shadow: none !important;
    background: none !important;
  }
  .tab-btn .tab-icon-shell svg { position:relative; z-index:1; }
  /* Pill above icon: 20% wider than icon; gap to icon via .tab-btn-stack */
  .nav-tab-indicator {
    box-sizing: border-box;
    width: calc(var(--tab-icon-size, 30px) * 1.2);
    height: 3px;
    min-height: 3px;
    border-radius: 9999px;
    margin: 0;
    align-self: center;
    flex-shrink: 0;
    background: transparent;
    opacity: 0;
    transform: none;
    transition: opacity 0.18s ease, background 0.18s ease;
  }
  .tab-btn.active .nav-tab-indicator {
    opacity: 1;
    background: var(--mood-accent);
    box-shadow: none;
  }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn.active .nav-tab-indicator {
    background: var(--accent);
    opacity: 1;
  }
  .tab-bar-spacer {
    height: calc(var(--axis-bottom-content-inset) + var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 56px);

    height: calc(var(--axis-bottom-content-inset) + var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 140px);
  }

  /* Active SESSION (LIST / GUIDED / SUMMARY): tight tail above tab bar — no duplicate --axis-bottom-content-inset + 56px stack */
  .tab-bar-spacer--session {
    height: calc(var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 12px);

  /* Summary: same tail as Today — long scroll so bottom CTA clears fixed tab bar + home indicator */

  .app[data-night="true"] .metrics-weight-chart-stack {

  .metrics-why-matters__title {

  .metrics-why-matters__list li {

  }
  .metrics-section {
    width: 100%;
    box-sizing: border-box;
    border-radius: var(--axis-radius-md);
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    margin-bottom: 16px;
    box-shadow: inset 0 1px 0 var(--glass-specular);
  }
  .app[data-night="true"] .metrics-section {
    background: #000000;
    border-color: rgba(255, 59, 48, 0.35);
  }
  .metrics-section__btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    border: none;
    background: transparent;
    color: var(--text-white);
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    text-align: left;
  }
  .metrics-section__btn-chev {
    font-size: 12px;
    opacity: 0.7;
    flex-shrink: 0;
  }
  .metrics-section__body {
    padding: 0 16px 16px;
    border-top: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
  }
  .metrics-section__body--flush {
    padding-left: 12px;
    padding-right: 12px;
  }
  .metrics-pain-mode-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .metrics-pain-mode-toggle__btn {
    flex: 1;
    min-height: 40px;
    border-radius: 10px;
    border: 1px solid var(--glass-border);
    background: rgba(0, 0, 0, 0.12);
    color: var(--text-secondary);
    font-size: var(--text-xs);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .metrics-pain-mode-toggle__btn--on {
    border-color: color-mix(in srgb, var(--accent) 50%, transparent);
    color: var(--accent);
  }
  .metrics-pain-grid-28 {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .metrics-pain-week-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }
  .metrics-pain-cell--today {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
    transform: scale(1.04);
    z-index: 1;
  }
  .metrics-pain-tip {
    margin-top: 10px;
    font-size: var(--text-xs);
    color: var(--text-secondary);
    line-height: 1.45;
  }
  .tab-bar-spacer--settings {
    height: calc(var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 28px);
    min-height: 0;
  }

  /* Light mode: distinct tab strip + separation from page (Safari frosted read) — not in AXIS Ultra */
  .tab-bar[data-theme="light"]:not([data-night="true"]) {
    background: #f6f7f8;
    border-top: 1px solid rgba(37, 37, 37, 0.1);
    box-shadow: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
  }

  /* Light: top dashboard strip — solid #f6f7f8; inactive chrome #E0E0E0; mood accent fills */
  .app[data-theme="light"]:not([data-night="true"]) .dashboard-header {
    background: #f6f7f8 !important;
    border-bottom: 1px solid rgba(37, 37, 37, 0.1);
    box-shadow: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
  }

  /* MOOD: clearance above portaled tab bar. iOS often under-scrolls when only padding-bottom is used on overflow:auto
     flex children — a real ::after flex item extends scrollHeight reliably. BASE .app uses overflow:hidden (not scroll). */
  .app--nav-gap-tight .app-body {
    scroll-padding-bottom: calc(var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 8px);
    overscroll-behavior-y: contain;
  }
  .app--nav-gap-tight .app-body::after {
    content: "";
    display: block;
    flex: 0 0 auto;
    width: 100%;
    min-height: calc(var(--axis-tab-clearance) + var(--axis-tab-h) + constant(safe-area-inset-bottom) + 20px);
    min-height: calc(var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 20px);
    pointer-events: none;
  }
  .app--nav-gap-tight .tab-bar-spacer--mood {
    height: 0 !important;
    min-height: 0 !important;
    flex-shrink: 0;
    width: 100%;
    margin: 0 !important;
    padding: 0 !important;
    overflow: hidden;
    pointer-events: none;
  }
  .mood-auto-card {
    box-sizing: border-box;
    width: 100%;
  }
  .mood-base-theme__label {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: color-mix(in srgb, var(--color-text-secondary) 78%, transparent);
    flex-shrink: 0;
  }
  .app[data-night="true"] .mood-base-theme__label {
    color: color-mix(in srgb, #ff3b30 45%, transparent);
  }
  .mood-base-theme__toggle {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  /* ── HOME ── */
  .home { min-height:100vh; position:relative; z-index:1; }
  .home-hdr { padding: var(--safe-top) var(--page-padding) 0; max-width:100%; }
  .home-wordmark {
    font-size: var(--text-xl); font-weight:700; letter-spacing:-0.02em; text-transform:uppercase; font-family: var(--font-display);
    color:var(--text-white); line-height:1; margin-bottom:0;
  }
  .home-eyebrow { display:none; }
  .home-brand { display:flex; flex-direction:column; align-items:flex-start; gap:0; }
  .home-brand-icon { display:none; }
  .home-tagline {
    font-size: var(--text-lg); color:var(--text-white); font-weight:400; font-style:normal;
    padding:18px 0 24px; letter-spacing:-0.01em; max-width:100%; display:block;
    line-height:1.25; text-align:left; margin:0;
  }
  /* End-of-list marker */
  .home .eol-marker {
    padding-left:var(--page-gutter);
    padding-right:var(--page-gutter);
    box-sizing:border-box;
  }
  .eol-marker {
    display:flex; align-items:center; justify-content:center;
    min-height:92px;
    padding-top:40px;
    padding-bottom:calc(84px + env(safe-area-inset-bottom, 0px));
    margin-bottom:0;
    --eol-lift: 28px;
    user-select:none; -webkit-user-select:none;
    position:relative; cursor:default; width:100%;
    max-width:100%; overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch;
    box-sizing:border-box;
  }
  .eol-xs {
    font-size: var(--text-xs); letter-spacing:0.8em; font-weight: 400;
    color:var(--eol-color);
    transition:opacity 0.4s ease;
    text-align:center;
    line-height:1;
    position:absolute; top:50%; left:50%; transform:translate(-50%, calc(-50% - var(--eol-lift)));
    white-space:nowrap;
  }
  .eol-tag {
    font-size: var(--text-xs); letter-spacing:0.22em; font-weight: 400;
    color:var(--eol-color);
    text-transform:uppercase;
    position:absolute; top:50%; left:50%; transform:translate(-50%, calc(-50% - var(--eol-lift)));
    opacity:0; transition:opacity 0.4s ease;
    white-space:nowrap; padding:0 12px; box-sizing:border-box;
    line-height:1;
    width:max-content; max-width:min(100vw - 48px, 100%);
  }
  .eol-marker.show-tag .eol-xs { opacity:0; }
  .eol-marker.show-tag .eol-tag { opacity:1; }

  /* ── TRACK GROUPS ── */
  .track-cards-outer { padding:0 var(--page-gutter) 24px; margin-bottom: var(--axis-safe-bottom); }
  /* Global dashboard (safe area + progress + AXIS + streak) */
  .dashboard-header {
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:130;
    padding-top:env(safe-area-inset-top, 0px);
    padding-bottom:8px;
    box-sizing:border-box;
    width:100%;
    -webkit-tap-highlight-color:transparent;
    background:var(--tab-bg);
    backdrop-filter:blur(20px) saturate(1.35);
    -webkit-backdrop-filter:blur(20px) saturate(1.35);
    border-bottom:1px solid var(--border);
  }
  .dashboard-header__row {
    display:grid;
    grid-template-columns:minmax(0, 1fr) auto minmax(0, 1fr);
    align-items:center;
    min-height:40px;
    gap:6px;
  }
  .dashboard-header__left {
    min-width:0;
    padding-left:var(--page-gutter);
    padding-right:6px;
    box-sizing:border-box;
  }
  .dashboard-header__progress-track {
    height:5px;
    border-radius:999px;
    background:#3a3a3c;
    overflow:hidden;
    width:100%;
    max-width:min(62px, 18vw); /* ~60–65px: iPhone status clock region */
  }
  .app[data-theme="light"]:not([data-night="true"]) .dashboard-header__progress-track {
    background:#9F9FA5;
  }
  .app[data-theme="light"]:not([data-night="true"]) .dashboard-header__progress-fill {
    background:var(--mood-color);
  }
  .app[data-theme="light"]:not([data-night="true"]) .dashboard-header__streak-cell--on {
    background:var(--mood-color);
  }
  .app[data-night="true"] .dashboard-header__progress-track {
    background:rgba(255, 59, 48, 0.28) !important;
  }
  .dashboard-header__progress-fill {
    height:100%;
    border-radius:inherit;
    background:var(--mood-color);
    transition:width 0.45s ease, background-color 0.45s ease, filter 0.35s ease;
    width:0%;
  }
  .dashboard-header__progress-fill.dashboard-header__progress-fill--overdrive {
    filter: drop-shadow(0 0 8px rgba(255, 165, 0, 0.6));
  }
  .dashboard-header__brand {
    font-family:var(--font-display);
    font-size:11px;
    font-weight:300;
    letter-spacing:0.42em;
    text-transform:uppercase;
    color:color-mix(in srgb, var(--text-dim) 78%, transparent);
    text-align:center;
    justify-self:center;
    padding:0 4px;
    pointer-events:none;
  }
  .app[data-theme="light"]:not([data-night="true"]) .dashboard-header__brand {
    color:#000000;
    -webkit-text-fill-color:#000000;
  }
  .app[data-theme="dark"]:not([data-night="true"]) .dashboard-header__brand {
    color:#ffffff;
    -webkit-text-fill-color:#ffffff;
  }
  .app[data-night="true"] .dashboard-header__brand {
    color:#FF3B30 !important;
    -webkit-text-fill-color:#FF3B30 !important;
  }
  .dashboard-header__right {
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:4px;
    padding-right:var(--page-gutter);
    padding-left:6px;
    min-width:0;
  }
  .dashboard-header__streak-cell {
    width:6px;
    height:6px;
    border-radius:1px;
    background:color-mix(in srgb, var(--text-dim) 28%, transparent);
    flex-shrink:0;
    transition:background-color 0.45s ease, transform 0.2s ease;
  }
  .app[data-theme="light"]:not([data-night="true"]) .dashboard-header__streak-cell:not(.dashboard-header__streak-cell--on) {
    background:#9F9FA5;
  }
  /* Dark (circadian): inactive track + empty streaks — mood tint reads on teal, not as “holes” */
  .app[data-theme="dark"]:not([data-night="true"]) .dashboard-header__progress-track {
    background:color-mix(in srgb, var(--mood-color) 23%, transparent);
  }
  .app[data-theme="dark"]:not([data-night="true"]) .dashboard-header__streak-cell:not(.dashboard-header__streak-cell--on) {
    background:color-mix(in srgb, var(--mood-color) 23%, transparent);
  }
  .dashboard-header__streak-cell--on {
    background:var(--mood-color);
  }
  /* Night: progress + streak use Ultra red (circadian --mood-color can stay orange on the shell) */
  .app[data-night="true"] .dashboard-header__progress-fill {
    background:#FF3B30 !important;
  }
  .app[data-night="true"] .dashboard-header__streak-cell--on {
    background:#FF3B30 !important;
  }
  .app[data-night="true"] .dashboard-header__streak-cell:not(.dashboard-header__streak-cell--on) {

/** Local calendar day key for history rows (handles ISO strings and toDateString). */
function axisLocalDateKey(raw) {

    if (Number.isNaN(t.getTime())) return "";
    return t.toDateString();
  } catch {
    return "";
  }
}

/** “Today” / “Yesterday” / short date for history group headers. */
function axisRelativeDayLabel(dateKey) {
  if (!dateKey) return "";
  const today = new Date();
  const t0 = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
  const d = new Date(dateKey);
  if (Number.isNaN(d.getTime())) return dateKey;
  const d0 = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
  const diff = Math.round((t0 - d0) / 86400000);

}

    const m = Number(e.duration);
    if (Number.isFinite(m) && m >= 0) sum += m;

async function bootstrapAxisApp() {
  console.log("BASE REVERT SUCCESSFUL");
  window.__AXIS_DATA_LOAD_ERROR = "";
  try {
    const res = await fetch("./axis_data.json", { cache: "no-store" });
    if (!res.ok) throw new Error("axis_data.json: HTTP " + res.status);
    const data = await res.json();
    window.AXIS_JSON = data;
    if (data && data.TRACKS && Object.keys(data.TRACKS).length) {
      TRACKS = axisNormalizeTracks(data.TRACKS);
    } else {
      throw new Error("axis_data.json: missing TRACKS");
    }
  } catch (err) {
    console.error("AXIS: workout data load failed", err);
    TRACKS = TRACKS_DATA_FALLBACK;
    window.__AXIS_DATA_LOAD_ERROR = "Workout library could not be loaded from axis_data.json. Sessions will be empty until the file is available next to this page. (" + (err && err.message ? err.message : String(err)) + ")";
  }
  try {
    if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
      showLoadErr("App libraries did not load. Check your connection and refresh.");
      return;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  } catch (e) {
    showLoadErr("Error: " + (e && e.message ? e.message : String(e)) + (e && e.stack ? "\n\n" + e.stack : ""));
  }
}
