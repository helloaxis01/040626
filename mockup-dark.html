<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root{
    --dark-bg:radial-gradient(ellipse at 50% 40%,#0f1f35 0%,#0a1525 45%,#080d18 100%);
    --accent:#FF8B78;
    --accent-dim:rgba(255,139,120,0.12);
    --accent-glow:rgba(255,139,120,0.22);
    --text:#f6f7f8;
    --card:rgba(0,0,0,0.52);
  }
  html,body{height:100%;margin:0;font-family:Barlow,system-ui,Arial;}
  body{background:var(--dark-bg);color:var(--text);display:flex;align-items:center;justify-content:center;}
  .hero{width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;padding:48px;}
  .card{position:relative;background:var(--card);border-radius:16px;padding:36px;max-width:900px;width:100%;box-shadow:0 12px 28px rgba(0,0,0,0.6);display:flex;gap:28px;align-items:center}
  .title{font-size:32px;font-weight:700;line-height:1;margin:0 0 8px;color:var(--text)}
  .subtitle{font-size:18px;margin:0 0 16px;opacity:0.9}
  .body{font-size:15px;color:rgba(246,247,248,0.9);margin-bottom:20px}
  .cta{display:inline-flex;align-items:center;gap:12px;background:var(--accent);color:#081018;padding:12px 20px;border-radius:12px;font-weight:700;text-decoration:none;box-shadow:0 8px 28px var(--accent-glow);}
  .badge{background:rgba(255,255,255,0.03);border-radius:12px;padding:10px 12px;color:var(--text);font-weight:700}
  @media (prefers-reduced-motion: reduce){ .card{transition:none} }
</style>
</head>
<body>
  <div class="hero">
    <div class="card" role="region" aria-label="Hero Dark">
      <div style="flex:1">
        <h1 class="title">Welcome to AXIS.</h1>
        <div class="subtitle">Personal movement, daily resets</div>
        <p class="body">Short, focused sessions to restore alignment, reduce tension, and prime your day — now with coral accents across both themes.</p>
        <a class="cta" href="#">Start Reset</a>
      </div>
      <div style="width:200px;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div class="badge">8 min</div>
        <div style="margin-top:12px;opacity:0.9;font-size:13px">Spine · Core · Posterior</div>
      </div>
    </div>
  </div>
</body>
</html>
